<ion-header class="detail-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <span class="counter">{{ current() + 1 }} / {{ photos.length }}</span>
    </ion-buttons>
    <ion-buttons slot="end">
      <ion-button class="round" fill="clear" aria-label="Fermer" (click)="dismiss()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content class="detail-content">
  <div #track class="carousel" (scroll)="onScroll()">
    @for (p of photos; track p.id) {
      <div class="slide">
        <img [src]="p.webviewPath" alt="Photo" />
      </div>
    }
  </div>
</ion-content>

<ion-footer class="detail-footer">
  <ion-toolbar>
    <div class="meta">
      <span class="chip">
        <ion-icon name="calendar"></ion-icon>
        <span>{{ photo.date | date: 'dd/MM/yyyy · HH:mm' }}</span>
      </span>
      <span class="chip loc">
        <ion-icon name="location"></ion-icon>
        <span>{{ photo.locationName || 'Localisation…' }}</span>
      </span>
    </div>
    <ion-buttons slot="end">
      <ion-button
        class="like-btn"
        [class.liked]="photo.liked"
        fill="clear"
        aria-label="Aimer la photo"
        (click)="toggleLike()"
      >
        <ion-icon slot="icon-only" [name]="photo.liked ? 'heart' : 'heart-outline'"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-footer>
