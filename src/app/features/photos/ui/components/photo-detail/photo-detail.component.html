<ion-header class="detail-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="round" fill="clear" aria-label="Fermer" (click)="dismiss()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ current() + 1 }} / {{ photos.length }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="detail-content">
  <div #track class="carousel" (scroll)="onScroll()">
    @for (p of photos; track p.id) {
      <div class="slide">
        <img [src]="p.webviewPath" alt="Photo" />
      </div>
    }
  </div>
</ion-content>

<ion-footer class="detail-footer">
  <ion-toolbar>
    <div class="info">
      <div class="meta">
        <div class="place-row">
          <span class="place">{{ photo.locationName || 'Position enregistrée' }}</span>
          @if (photo.purchased) {
            <span class="badge"><ion-icon name="checkmark-circle"></ion-icon> Achetée</span>
          }
        </div>
        <span class="date">{{ photo.date | date: 'd MMM yyyy à HH:mm' }}</span>
      </div>

      <div class="actions">
        <button type="button" class="act like" [class.liked]="photo.liked" (click)="toggleLike()">
          <ion-icon [name]="photo.liked ? 'heart' : 'heart-outline'"></ion-icon>
          <span>{{ photo.liked ? 'Aimée' : "J'aime" }}</span>
        </button>
        <button
          type="button"
          class="act del"
          aria-label="Supprimer la photo"
          (click)="deletePhoto()"
        >
          <ion-icon name="trash"></ion-icon>
        </button>
      </div>
    </div>
  </ion-toolbar>
</ion-footer>
