<ion-header class="detail-header">
  <ion-toolbar>
    <ion-buttons slot="start">
      <ion-button class="round" fill="clear" aria-label="Fermer" (click)="dismiss()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
    <ion-title>{{ current() + 1 }} / {{ photos.length }}</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content class="detail-content">
  <div #track class="carousel" (scroll)="onScroll()">
    @for (p of photos; track p.id) {
      <div class="slide">
        <img [src]="p.webviewPath" alt="Photo" />
      </div>
    }
  </div>
</ion-content>

<ion-footer class="detail-footer">
  <ion-toolbar>
    <div class="bar">
      <div class="actions">
        <button
          type="button"
          class="act"
          [class.liked]="photo.liked"
          aria-label="Aimer la photo"
          (click)="toggleLike()"
        >
          <ion-icon [name]="photo.liked ? 'heart' : 'heart-outline'"></ion-icon>
        </button>
        <button type="button" class="act" aria-label="Supprimer la photo" (click)="deletePhoto()">
          <ion-icon name="trash"></ion-icon>
        </button>
      </div>
      <div class="meta">
        <span class="loc">
          <ion-icon name="location"></ion-icon>
          <span>{{ photo.locationName || 'Localisation…' }}</span>
        </span>
        <span class="date">{{ photo.date | date: 'dd/MM/yyyy · HH:mm' }}</span>
      </div>
    </div>
  </ion-toolbar>
</ion-footer>
