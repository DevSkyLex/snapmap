<ion-header>
  <ion-toolbar>
    <ion-title>{{ photos.length }} photos ici</ion-title>
    <ion-buttons slot="end">
      <ion-button class="round" fill="clear" aria-label="Fermer" (click)="dismiss()">
        <ion-icon slot="icon-only" name="close"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  <div class="thumb-grid">
    @for (photo of photos; track photo.id) {
      <div class="thumb" (click)="open(photo)">
        <img [src]="photo.webviewPath" alt="Photo" loading="lazy" />
      </div>
    }
  </div>
</ion-content>
