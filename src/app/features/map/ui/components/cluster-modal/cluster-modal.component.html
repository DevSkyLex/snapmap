<ion-content class="cluster">
  <header class="head">
    <div class="who">
      <span class="loc"><ion-icon name="location" aria-hidden="true"></ion-icon>{{ place }}</span>
      <h2>{{ photos.length }} photo{{ photos.length > 1 ? 's' : '' }} ici</h2>
    </div>
    <button type="button" class="close" aria-label="Fermer" (click)="dismiss()">
      <ion-icon name="close" aria-hidden="true"></ion-icon>
    </button>
  </header>

  <div class="thumb-grid">
    @for (photo of photos; track photo.id) {
      <button type="button" class="thumb" (click)="open(photo)">
        <img
          [src]="photo.webviewPath"
          [alt]="'Photo — ' + (photo.locationName || place)"
          loading="lazy"
          decoding="async"
        />
      </button>
    }
  </div>
</ion-content>
