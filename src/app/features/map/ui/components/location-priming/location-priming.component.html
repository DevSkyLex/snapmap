<ion-content class="priming">
  <span class="icon">
    <span class="halo" aria-hidden="true"></span>
    <span class="disc"><ion-icon name="location"></ion-icon></span>
  </span>

  <h2>Activer la localisation</h2>
  <p class="lead">
    SnapMap utilise votre position pour épingler vos selfies sur la carte au bon endroit.
  </p>

  <div class="note">
    <ion-icon name="information-circle-outline" aria-hidden="true"></ion-icon>
    <span>Refuser ne bloque pas la carte : elle s'ouvrira sur une position par défaut.</span>
  </div>

  <div class="actions">
    <button type="button" class="allow" (click)="allow()">Autoriser la localisation</button>
    <button type="button" class="later" (click)="later()">Plus tard</button>
  </div>
</ion-content>
