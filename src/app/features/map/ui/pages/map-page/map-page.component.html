<ion-header [translucent]="true">
  <ion-toolbar>
    <ion-title>Carte</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <div class="map-ctn">
    @if (!mapLoaded()) {
      <div class="loading-ctn">
        <span class="loader-orb"></span>
        <p>Chargement de la carte…</p>
      </div>
    }
    <div id="map" class="map"></div>
  </div>
</ion-content>
