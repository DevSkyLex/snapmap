<ion-header [translucent]="true">
  <ion-toolbar>
    <div class="brand" slot="start">
      <span class="brand-logo"><ion-icon name="location"></ion-icon></span>
      SnapMap
    </div>
    <ion-buttons slot="end">
      <ion-button aria-label="Prendre une photo" (click)="takePhoto()">
        <ion-icon slot="icon-only" name="camera-outline"></ion-icon>
      </ion-button>
    </ion-buttons>
  </ion-toolbar>
</ion-header>

<ion-content>
  @if (library.photos().length || library.isCapturing()) {
    <div class="photo-grid">
      @if (library.isCapturing()) {
        <app-skeleton-card></app-skeleton-card>
      }

      @for (photo of library.photos(); track photo.id) {
        <button type="button" class="cell" (click)="openDetail(photo)">
          <img [src]="photo.webviewPath" alt="Photo" loading="lazy" />
          @if (photo.liked) {
            <ion-icon class="liked-badge" name="heart" aria-label="Aimée"></ion-icon>
          }
        </button>
      }
    </div>
  } @else {
    <div class="empty">
      <span class="empty-icon"><ion-icon name="images-outline"></ion-icon></span>
      <h2>Vos souvenirs commencent ici</h2>
      <p>Prenez une photo : elle apparaîtra ici et sur la carte, géolocalisée.</p>
      <ion-button class="btn-primary cta" (click)="takePhoto()">
        <ion-icon slot="start" name="camera"></ion-icon>
        Prendre une photo
      </ion-button>
    </div>
  }
</ion-content>
