<ion-header [translucent]="true">
  <ion-toolbar color="primary">
    <ion-title>SnapMap</ion-title>
  </ion-toolbar>
</ion-header>

<ion-content [fullscreen]="true">
  <ion-grid>
    <ion-row>
      @if (library.isCapturing()) {
        <ion-col size="6">
          <app-skeleton-card></app-skeleton-card>
        </ion-col>
      }

      @for (photo of library.photos(); track photo.id) {
        <ion-col size="6">
          <div class="photo-card" (click)="openDetail(photo)">
            <img [src]="photo.webviewPath" alt="Photo" />

            <ion-button class="action like" fill="clear" (click)="toggleLike(photo, $event)">
              <ion-icon
                slot="icon-only"
                [name]="photo.liked ? 'heart' : 'heart-outline'"
                [color]="photo.liked ? 'danger' : 'light'"
              ></ion-icon>
            </ion-button>

            <ion-button class="action delete" fill="clear" (click)="confirmDelete(photo, $event)">
              <ion-icon slot="icon-only" name="trash" color="light"></ion-icon>
            </ion-button>
          </div>
        </ion-col>
      } @empty {
        @if (!library.isCapturing()) {
          <ion-col size="12">
            <p class="empty">
              Aucune photo pour l'instant.<br />
              Appuyez sur l'appareil photo pour commencer.
            </p>
          </ion-col>
        }
      }
    </ion-row>
  </ion-grid>

  <ion-fab vertical="bottom" horizontal="center" slot="fixed">
    <ion-fab-button (click)="takePhoto()">
      <ion-icon name="camera"></ion-icon>
    </ion-fab-button>
  </ion-fab>
</ion-content>
